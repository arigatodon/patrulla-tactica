<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>smoke PATRULLAS</title></head>
<body>
<!-- DOM mínimo con los mismos ids que index.html -->
<div id="escenario">
  <canvas id="juego" width="960" height="600"></canvas>
  <div id="telefono"><div id="telTitulo"></div><div id="telRespeto"></div>
    <div id="telAcciones"></div><div id="telFeed"></div><button id="telCerrar"></button></div>
  <div id="pantallaIntro" style="display:none"><button id="btnEmpezar"></button></div>
  <div id="pantallaBrief" style="display:none"><h2 id="briefTitulo"></h2><p id="briefTexto"></p><button id="btnBrief"></button></div>
  <div id="pantallaFin" style="display:none"><h2 id="finTitulo"></h2><p id="finTexto"></p>
    <button id="btnSiguiente"></button><button id="btnReiniciarTodo"></button></div>
</div>
<div id="etiquetaTurno"></div><div id="nombreBarrio"></div><div id="objetivoTexto"></div>
<span id="respetoNum"></span><span id="cartasNum"></span><div id="respetoBarra"></div>
<div id="infoUnidad"></div><div id="cajaPronostico"><div id="pronostico"></div></div>
<button id="btnTelefono"></button><button id="btnEsperar"></button>
<div id="habilidadesCrew"></div>
<button id="btnOperativo"></button><button id="btnFinTurno"></button><button id="btnAmbiente"></button><button id="btnRotar"></button>
<div id="registro"></div><div id="ayuda"></div>

<script>
  // en headless dump-dom no hay frames de compositor: emular rAF con timers
  window.requestAnimationFrame = cb => setTimeout(() => cb(performance.now()), 16);
  window.AUTODIALOGO = true;   // los diálogos se resuelven solos (primera opción)
</script>
<script src="js/nucleo.js"></script>
<script src="js/datos.js"></script>
<script src="js/mapa.js"></script>
<script src="js/unidades.js"></script>
<script src="js/objetos.js"></script>
<script src="js/combate.js"></script>
<script src="js/ia.js"></script>
<script src="js/telefono.js"></script>
<script src="js/render.js"></script>
<script src="js/interfaz.js"></script>
<script src="js/principal.js"></script>
<script>
(async () => {
  const res = [];
  const t = (nombre, cond) => res.push((cond ? 'PASS' : 'FAIL') + ' ' + nombre);
  try {
    borrarSave();
    cruzada.barrio = 1; cruzada.respeto = 10; cruzada.cartas = 0;
    cruzada.habilidades = []; cruzada.plantilla = null;

    // --- 1. mapas procedurales: 12 semillas conectadas ---
    let mapasOK = 0;
    for (let s = 1; s <= 12; s++)
      if (_conectado(generarMapa(s * 7919, 1 + (s % 4)))) mapasOK++;
    t('mapas-conectados-12/12', mapasOK === 12);

    // ============ PRÓLOGO (misión molotov, Playa Chica) ============
    iniciarMision(12345);
    t('prologo-tipo', partida.tipoMision === 'molotov' && partida.nombreBarrio === 'Playa Chica');
    t('prologo-sin-dron', !vivos('jugador').some(u => u.vuela));
    t('prologo-3-personajes', vivos('jugador').length === 3);
    t('prologo-sin-jefe', !vivos('enemigo').some(e => e.jefe));
    const pt = mapa.puntos[0];
    t('prologo-punto', pt && mapa.celdas[pt.y][pt.x] === 'P');
    t('prologo-molotov-equipada', vivos('jugador')[0].arma.id === 'molotov');
    t('prologo-objetivo-ui', $('objetivoTexto').textContent.includes('punto de venta'));
    t('mapa-grande', mapa.cols >= 18 && mapa.filas >= 13);
    t('slots-base-3', vivos('jugador')[0].slots === 3);

    // rotación de cámara: ida y vuelta exactas en las 4 orientaciones
    let rotOK = true;
    for (rotacion = 0; rotacion < 4; rotacion++)
      for (const [qx, qy] of [[0, 0], [5, 3], [mapa.cols - 1, mapa.filas - 1]]) {
        const [rx, ry] = aRender(qx, qy);
        const [bx, by] = desRender(rx, ry);
        if (bx !== qx || by !== qy) rotOK = false;
      }
    rotacion = 0;
    t('rotacion-reversible', rotOK);
    centrarCamara();
    t('zoom-encuadra', zoom > 0.4 && zoom <= 1);

    // prender el punto de cerca y escapar al oeste
    const ruth = vivos('jugador')[0];
    const [ax, ay] = celdaLibreCerca(pt.x - 1, pt.y);
    ruth.x = ax; ruth.y = ay; ruth.gx = ax; ruth.gy = ay;
    actualizarVision();
    prenderDeCerca(ruth, pt);
    t('punto-quemado', pt.quemado === true);
    t('banda-alertada', vivos('enemigo').every(e => e.aggro));
    let col = 0;
    for (const u of vivos('jugador')) { u.x = 0; u.y = Math.min(col++, mapa.filas - 1); u.gx = u.x; u.gy = u.y; }
    chequearFin();
    t('prologo-victoria-escape', partida.terminada === true);
    t('avanza-a-cap1', cruzada.barrio === 2);
    t('recompensa-habilidad', cruzada.habilidades.length === 1);

    // ============ CAPÍTULO 1 (Santa Elisa: cancha + skatepark) ============
    $('pantallaFin').style.display = 'none';
    cruzada.habilidades = ['olla', 'apagon', 'murga'];   // probar las 3
    iniciarMision(777);
    t('cap1-santa-elisa', partida.tipoMision === 'jefe' && partida.nombreBarrio === 'Santa Elisa');
    t('cap1-con-dron', vivos('jugador').some(u => u.vuela));
    t('cap1-jefe-rucio', vivos('enemigo').some(e => e.jefe && e.nombre === '"El Rucio"'));
    t('cap1-cancha', !!mapa.rasgos.cancha && mapa.celdas[mapa.rasgos.cancha.y + 1][mapa.rasgos.cancha.x + 1] === 'F');
    t('cap1-skate-suelto', sueltos.some(s => s.item.id === 'skate'));
    t('usos-habilidades', partida.usosHabilidad.olla === 1 && partida.usosHabilidad.murga === 1);

    // skate: +2 de movimiento al subirse
    const flaco0 = vivos('jugador').find(u => u.clase === 'pescador');
    const movAntes = flaco0.mov;
    entregar(flaco0, instanciarObjeto('skate'));
    t('skate-mas-movimiento', flaco0.vehiculo === 'skate' && flaco0.mov === movAntes + 2);

    // mochila limitada por slots y ampliable con puntos
    flaco0.mochila = [];
    for (const id of ['palo', 'botella', 'cuchilla', 'manopla']) meterMochila(flaco0, instanciarArma(id));
    t('mochila-limite-3', flaco0.mochila.length === 3);
    flaco0.puntos = 1;
    subirSlots(flaco0);
    t('slots-ampliados', flaco0.slots === 4 && flaco0.puntos === 0);

    // cambio de arma gratis desde la mochila recalcula blancos
    seleccionar(flaco0);
    equiparDeMochila(flaco0, 0);
    t('cambio-arma-gratis', flaco0.arma.id !== 'punos' && !flaco0.actuo);
    deseleccionar();

    // soldado fotografiado queda rastreado (visible aunque esté lejos)
    const lejano = vivos('enemigo').find(e => !e.sapo && !visible(e.x, e.y));
    if (lejano) {
      lejano.marcado = true;
      const alc = alcanceDe(flaco0);
      lejano.x = flaco0.x + 1; lejano.y = flaco0.y; lejano.gx = lejano.x; lejano.gy = lejano.y;
      const op = opcionesAtaque(flaco0, alcanceDe(flaco0));
      t('marcado-atacable-sin-vision', op.has(lejano) || visible(lejano.x, lejano.y));
      lejano.marcado = false;
    } else t('marcado-atacable-sin-vision', true);

    // --- olla comunitaria: cura a toda la patrulla ---
    const herido = vivos('jugador')[0];
    herido.pv = Math.max(1, herido.pv - 6);
    const pvAntes = herido.pv;
    usarHabilidadCrew('olla');
    t('olla-cura', herido.pv === pvAntes + 5 && partida.usosHabilidad.olla === 0);
    t('olla-sin-usos', !habilidadLista('olla'));

    // --- murga: la banda pierde la ronda entera ---
    usarHabilidadCrew('murga');
    t('murga-activa', partida.murgaRondas === 1);
    const posiciones = vivos('enemigo').map(e => e.x + ',' + e.y).join('|');
    for (const e of vivos('enemigo')) e.aggro = true;   // querrían moverse
    partida.ocupado = false;
    const rondaAntes = partida.ronda;
    await turnoEnemigo();
    t('murga-congela', vivos('enemigo').map(e => e.x + ',' + e.y).join('|') === posiciones);
    t('murga-ronda-avanza', partida.ronda === rondaAntes + 1 && partida.murgaRondas === 0);
    for (const e of vivos('enemigo')) e.aggro = false;

    // --- apagón: los sapos no alertan ---
    usarHabilidadCrew('apagon');
    t('apagon-activo', partida.apagonRondas === 2);
    const sapo = vivos('enemigo').find(e => e.sapo);
    const maicol = vivos('jugador').find(u => u.clase === 'tecnico');
    if (sapo && maicol) {
      const [sx, sy] = celdaLibreCerca(maicol.x + 1, maicol.y);
      sapo.x = sx; sapo.y = sy; sapo.gx = sx; sapo.gy = sy;
      partida.ocupado = false;
      await turnoEnemigo();
      t('apagon-sapo-mudo', !sapo.dioAlarma && partida.apagonRondas === 1);
    } else t('apagon-sapo-mudo', false);

    // --- regresiones básicas del motor ---
    const flaco = vivos('jugador').find(u => u.clase === 'pescador');
    flaco.mochila = [];                      // sin repuesto: rota el arma → puños
    flaco.arma = instanciarArma('botella');
    gastarArma(flaco);
    t('durabilidad-rompe', flaco.arma.id === 'punos');
    flaco.mochila = [instanciarArma('cuchilla')];   // con repuesto: auto-equipa
    flaco.arma = instanciarArma('botella');
    gastarArma(flaco);
    t('durabilidad-autoequipa', flaco.arma.id === 'cuchilla' && flaco.mochila.length === 0);
    sembrar(999);
    const rarezas = new Set();
    for (let i = 0; i < 200; i++) rarezas.add(defDe(tirarLoot()).rareza);
    t('loot-rarezas', rarezas.size >= 3);

    // --- victoria del capítulo: cae el jefe ---
    for (const e of vivos('enemigo').filter(e => e.jefe)) e.pv = 0;
    partida.terminada = false;
    chequearFin();
    t('cap1-victoria', partida.terminada === true && cruzada.barrio === 3);

    // ============ CAPÍTULO 2 (Barrio Estación: Los Cholas) ============
    $('pantallaFin').style.display = 'none';
    iniciarMision(2024);
    t('cap2-estacion', partida.tipoMision === 'puntos' && partida.nombreBarrio === 'Barrio Estación');
    t('cap2-rieles', mapa.rasgos.rieles !== undefined && mapa.celdas[mapa.rasgos.rieles].every(c => c === 'R' || c === 'P' || c === 'J'));
    t('cap2-tres-puntos', mapa.puntos.length === 3);
    t('cap2-cholas-ametralleta', vivos('enemigo').some(e => e.clase === 'cholo' && e.arma.id === 'ametralleta'));
    // quemar los 3 puntos = victoria (sin necesidad de escapar)
    const q = vivos('jugador')[0];
    for (const p of mapa.puntos) prenderPunto(q, p);
    t('cap2-victoria-puntos', partida.terminada === true && cruzada.barrio === 4);

    // ============ CAPÍTULO 3 (El Arellano: dunas y scooters) ============
    $('pantallaFin').style.display = 'none';
    iniciarMision(31337);
    t('cap3-arellano', partida.nombreBarrio === 'El Arellano' && partida.tema === 'dunas');
    let dunas = 0;
    for (const fila of mapa.celdas) for (const c of fila) if (c === 'D') dunas++;
    t('cap3-hay-dunas', dunas > 8);
    const enScooter = vivos('enemigo').find(e => e.clase === 'scooter');
    t('cap3-scooter-rapido', !!enScooter && enScooter.vehiculo === 'scooter' && enScooter.mov >= 6);

    // ============ POLICÍA: dos ramas (vendidos / coima) ============
    // rama vendidos: forzar rnd bajo (función global reasignable)
    const rndReal = rnd;
    partida.policiaLlamada = false; partida.policia = null; partida.terminada = false;
    rnd = () => 0.1;   // llamada exitosa (0.1 < 0.30)
    const maicol2 = vivos('jugador').find(u => u.clase === 'tecnico') || vivos('jugador')[0];
    maicol2.actuo = false; partida.seleccion = maicol2; partida.estado = 'seleccion';
    accionLlamarPolicia(maicol2);
    t('policia-programada', !!partida.policia && partida.policia.llega > partida.ronda && partida.policiaLlamada);
    partida.policia.llega = partida.ronda;   // que lleguen ya
    rnd = () => 0.2;   // 0.2 < 0.35 → vendidos
    await chequearPolicia();
    t('policia-vendida-spawn', vivos('enemigo').filter(e => e.esPolicia).length === 2);
    // se retiran solos tras sus rondas de "servicio"
    for (const e of vivos('enemigo')) if (e.esPolicia) e.seVaEnRonda = partida.ronda;
    partida.ocupado = false;
    await turnoEnemigo();
    t('policia-se-retira', vivos('enemigo').filter(e => e.esPolicia).length === 0);

    // rama coima: pagan y la policía espanta a la banda (AUTODIALOGO elige pagar)
    partida.policia = { llega: partida.ronda, resuelto: false };
    cruzada.respeto = 50;
    rnd = () => 0.9;   // 0.9 > 0.35 → honestos-que-piden
    await chequearPolicia();
    t('policia-coima-barrido', partida.operativoRondas >= 2 && cruzada.respeto === 40);
    rnd = rndReal;

    // llamada fallida: 70% de las veces no viene nadie (y no se puede rellamar)
    partida.policiaLlamada = false; partida.policia = null;
    rnd = () => 0.9;   // 0.9 > 0.30 → no vienen
    maicol2.actuo = false; partida.seleccion = maicol2; partida.estado = 'seleccion';
    accionLlamarPolicia(maicol2);
    t('policia-no-viene', partida.policia === null && partida.policiaLlamada);
    rnd = rndReal;

    // ============ CÁMARA: paneo con límites y zoom manual ============
    const oxAntes = OX, oyAntes = OY;
    moverCamara(120, 90);
    t('camara-panea', OX !== oxAntes || OY !== oyAntes);
    panX = 99999; panY = 99999; centrarCamara();
    t('camara-limitada', isFinite(OX) && isFinite(OY) && Math.abs(panX) < 3000 && Math.abs(panY) < 3000);
    panX = 0; panY = 0;
    ajustarZoom(1.5);
    t('zoom-manual', zoom > zoomFit && zoomExtra > 1);
    zoomExtra = 1; centrarCamara();

    // ============ OBJETOS NUEVOS ============
    // armadura: el chaleco reduce el daño recibido
    const tanque = vivos('jugador')[0];
    const atacante = vivos('enemigo').find(e => !e.sapo);
    const sinChaleco = danoBase(atacante, tanque);
    entregar(tanque, instanciarObjeto('chaleco'));
    t('chaleco-equipado', tanque.armadura === 'chaleco');
    t('chaleco-reduce-dano', danoBase(atacante, tanque) === Math.max(1, sinChaleco - 2));

    // silla rompible → arma silla
    const romperdor = vivos('jugador').find(u => !u.vuela && u !== tanque) || tanque;
    const sxx = romperdor.x + 1 < mapa.cols ? romperdor.x + 1 : romperdor.x - 1;
    mapa.celdas[romperdor.y][sxx] = 'S';
    romperdor.arma = instanciarArma('punos');
    romperMueble(romperdor, sxx, romperdor.y);
    t('silla-es-arma', romperdor.arma.id === 'silla');

    // basurero rompible → algo sale
    const oxx = romperdor.x - 1 >= 0 ? romperdor.x - 1 : romperdor.x + 2;
    mapa.celdas[romperdor.y][oxx] = 'O';
    const cargaAntes = romperdor.mochila.length;
    romperMueble(romperdor, oxx, romperdor.y);
    t('basurero-da-loot', mapa.bancasRotas.has(clave(oxx, romperdor.y)) &&
        (romperdor.mochila.length >= cargaAntes));

    // fuegos artificiales: área que aturde sin incendiar
    const victima = vivos('enemigo').find(e => !e.sapo);
    romperdor.arma = instanciarArma('fuegos');
    const fuegosAntes = mapa.fuego.size;
    await ataqueArea(romperdor, victima.x, victima.y);
    t('fuegos-aturden', (victima.pv <= 0 || victima.aturdido >= 1) && mapa.fuego.size === fuegosAntes);

    // --- final (Las Tomas de La Punta) y rotación procedural ---
    cruzada.barrio = 5;
    $('pantallaFin').style.display = 'none';
    iniciarMision(4242);
    t('final-la-punta', partida.tipoMision === 'final' && vivos('enemigo').some(e => e.jefe && e.nombre === '"El Patrón de La Punta"'));
    t('final-mas-banda', vivos('enemigo').length >= 10);
    t('post-final-rotacion', capituloDe(6).tipo === 'jefe' && capituloDe(6).nombre.length > 0);
    // loot del sector: en santaelisa pueden salir skates
    partida.tema = 'santaelisa'; sembrar(31);
    let salioSkate = false;
    for (let i = 0; i < 300; i++) if (tirarLoot().id === 'skate') { salioSkate = true; break; }
    t('loot-skate-en-santaelisa', salioSkate);
  } catch (e) {
    res.push('ERROR ' + e.message + ' @ ' + (e.stack || '').split('\n')[1]);
  }
  const d = document.createElement('div');
  d.id = 'resultado';
  d.textContent = res.join(' | ');
  document.body.appendChild(d);
})();
</script>
</body>
</html>
